name: Deploy ID-based journal posting migration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-id-based-posting.yml'
      - 'supabase/migrations/20260722040000_id_based_single_line_posting.sql'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply and verify ID-based journal posting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          if [[ -z "${connection_uri}" ]]; then
            echo "::error::SUPABASE_DB_URL is not configured for the production environment."
            exit 1
          fi

          if [[ "${connection_uri}" != postgres://* && "${connection_uri}" != postgresql://* ]]; then
            echo "::error::SUPABASE_DB_URL must be a PostgreSQL URI beginning with postgres:// or postgresql://."
            exit 1
          fi

      - name: Apply and verify migration atomically
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          psql "${connection_uri}" \
            --set ON_ERROR_STOP=1 \
            --single-transaction \
            --file supabase/migrations/20260722040000_id_based_single_line_posting.sql \
            --command "
              do \$verify\$
              begin
                if to_regprocedure('public.post_single_line_entry(uuid,date,uuid,text,uuid,text,text,uuid,numeric)') is null then
                  raise exception 'ID-based journal posting function was not found after migration';
                end if;

                if not exists (
                  select 1
                  from information_schema.columns
                  where table_schema = 'public'
                    and table_name = 'entries'
                    and column_name = 'client_request_id'
                ) then
                  raise exception 'Journal idempotency column was not found after migration';
                end if;

                if not exists (
                  select 1
                  from pg_indexes
                  where schemaname = 'public'
                    and tablename = 'entries'
                    and indexname = 'entries_client_request_id_uidx'
                ) then
                  raise exception 'Journal idempotency index was not found after migration';
                end if;
              end
              \$verify\$;
            "
