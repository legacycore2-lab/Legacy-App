name: Deploy expanded projects schema

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-projects-schema.yml'
      - 'supabase/migrations/20260721090000_expand_projects.sql'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply and verify expanded projects schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          if [[ "${connection_uri}" != postgres://* && "${connection_uri}" != postgresql://* ]]; then
            echo "::error::SUPABASE_DB_URL must be a valid PostgreSQL URI."
            exit 1
          fi

      - name: Apply and verify projects migration
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          psql "${connection_uri}" \
            --set ON_ERROR_STOP=1 \
            --file supabase/migrations/20260721090000_expand_projects.sql \
            --command "
              do \$verify\$
              declare
                required_column text;
              begin
                foreach required_column in array array[
                  'code',
                  'client_name',
                  'location',
                  'manager',
                  'status',
                  'contract_value',
                  'received',
                  'spent',
                  'progress',
                  'end_date',
                  'notes',
                  'created_at',
                  'updated_at',
                  'created_by',
                  'is_archived'
                ]
                loop
                  if not exists (
                    select 1
                    from information_schema.columns
                    where table_schema = 'public'
                      and table_name = 'projects'
                      and column_name = required_column
                  ) then
                    raise exception 'Required projects column % was not found', required_column;
                  end if;
                end loop;

                if not exists (
                  select 1
                  from pg_indexes
                  where schemaname = 'public'
                    and tablename = 'projects'
                    and indexname = 'projects_code_unique_idx'
                ) then
                  raise exception 'Projects code unique index was not found';
                end if;

                if not exists (
                  select 1
                  from pg_constraint
                  where conrelid = 'public.projects'::regclass
                    and conname = 'projects_status_check'
                ) then
                  raise exception 'Projects status constraint was not found';
                end if;
              end
              \$verify\$;
            "
