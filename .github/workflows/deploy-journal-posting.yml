name: Deploy journal posting migration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-journal-posting.yml'
      - 'supabase/migrations/20260722020000_single_line_journal_posting.sql'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply and verify journal posting RPC
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      PGDATABASE: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PGDATABASE}" ]]; then
            echo "::error::SUPABASE_DB_URL is not configured for the production environment."
            exit 1
          fi

      - name: Apply migration atomically
        shell: bash
        run: |
          set -euo pipefail
          psql \
            --set ON_ERROR_STOP=1 \
            --single-transaction \
            --file supabase/migrations/20260722020000_single_line_journal_posting.sql

      - name: Verify deployed function
        shell: bash
        run: |
          set -euo pipefail
          signature="$(
            psql \
              --no-align \
              --tuples-only \
              --set ON_ERROR_STOP=1 \
              --command "select to_regprocedure('public.post_single_line_entry(date,text,text,text,text,text,text,numeric)');"
          )"
          if [[ "${signature}" != "post_single_line_entry(date,text,text,text,text,text,text,numeric)" ]]; then
            echo "::error::Journal posting function was not found after migration."
            exit 1
          fi
