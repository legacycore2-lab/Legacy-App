name: Deploy realtime data synchronization

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-realtime-sync.yml'
      - 'supabase/migrations/20260722050000_enable_realtime_sync.sql'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  deploy:
    name: Enable and verify production realtime tables
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          if [[ "${connection_uri}" != postgres://* && "${connection_uri}" != postgresql://* ]]; then
            echo "::error::SUPABASE_DB_URL must be a valid PostgreSQL URI."
            exit 1
          fi

      - name: Apply and verify realtime migration
        shell: bash
        run: |
          set -euo pipefail
          connection_uri="$(printf '%s' "${DATABASE_URL}" | tr -d '\r\n')"
          connection_uri="${connection_uri#\"}"
          connection_uri="${connection_uri%\"}"

          psql "${connection_uri}" \
            --set ON_ERROR_STOP=1 \
            --single-transaction \
            --file supabase/migrations/20260722050000_enable_realtime_sync.sql \
            --command "
              do \$verify\$
              declare
                required_table text;
              begin
                foreach required_table in array array['entries', 'accounts', 'projects']
                loop
                  if not exists (
                    select 1
                    from pg_publication_tables
                    where pubname = 'supabase_realtime'
                      and schemaname = 'public'
                      and tablename = required_table
                  ) then
                    raise exception 'Realtime publication is missing public.%', required_table;
                  end if;
                end loop;
              end
              \$verify\$;
            "
