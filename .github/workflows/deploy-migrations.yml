name: Deploy database migrations to production

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate database credentials
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${DATABASE_URL}" != postgres://* && "${DATABASE_URL}" != postgresql://* ]]; then
            echo "::error::SUPABASE_DB_URL must be a valid PostgreSQL URI."
            exit 1
          fi
          echo "Credentials validated."

      - name: Setup migration tracking and apply new migrations
        shell: bash
        run: |
          set -euo pipefail
          DB="${DATABASE_URL}"

          # 1. إنشاء جدول التتبع لو مش موجود
          psql "${DB}" -c "
            create table if not exists public._legacy_migrations (
              filename   text primary key,
              applied_at timestamptz not null default now()
            );
          "

          # 2. لو الجدول فاضل — سجّل كل الـ migrations القديمة (ما عدا الأخير) كـ applied
          EXISTING=$(psql "${DB}" -t -A -c "select count(*) from public._legacy_migrations;")
          if [[ "${EXISTING}" -eq 0 ]]; then
            echo "First run — seeding existing migrations..."
            ALL=($(ls supabase/migrations/*.sql | sort))
            TOTAL=${#ALL[@]}
            if [[ $TOTAL -gt 1 ]]; then
              for ((i=0; i<TOTAL-1; i++)); do
                FNAME="$(basename "${ALL[$i]}")"
                psql "${DB}" -c "
                  insert into public._legacy_migrations (filename)
                  values ('${FNAME}')
                  on conflict (filename) do nothing;
                "
                echo "Seeded: ${FNAME}"
              done
            fi
          fi

          # 3. طبّق كل migration مش مسجّل
          APPLIED=0
          for MIGRATION in $(ls supabase/migrations/*.sql | sort); do
            FNAME="$(basename "${MIGRATION}")"
            IS_DONE=$(psql "${DB}" -t -A -c "
              select exists(
                select 1 from public._legacy_migrations where filename = '${FNAME}'
              );
            ")
            if [[ "${IS_DONE}" == "t" ]]; then
              echo "Skip: ${FNAME}"
              continue
            fi
            echo "Apply: ${FNAME}"
            psql "${DB}" -v ON_ERROR_STOP=1 --single-transaction -f "${MIGRATION}"
            psql "${DB}" -c "
              insert into public._legacy_migrations (filename)
              values ('${FNAME}')
              on conflict (filename) do nothing;
            "
            echo "Done: ${FNAME}"
            APPLIED=$((APPLIED + 1))
          done
          echo "New migrations applied: ${APPLIED}"

      - name: Verify schema health
        shell: bash
        run: |
          set -euo pipefail
          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -c "
            do \$\$
            declare tbl text;
            begin
              foreach tbl in array array['entries','journals','journal_lines','accounts','projects'] loop
                if not exists (
                  select 1 from information_schema.tables
                  where table_schema = 'public' and table_name = tbl
                ) then
                  raise exception 'Missing table: %', tbl;
                end if;
              end loop;
              raise notice 'Schema OK.';
            end
            \$\$;
          "
