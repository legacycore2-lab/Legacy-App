name: Prettier Debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --write src/features/journal/hooks/useSingleLineJournalForm.ts src/features/journal/services/journal-entry.service.ts src/shared/date/local-date.ts
      - uses: actions/upload-artifact@v4
        with:
          name: prettier-output
          path: |
            src/features/journal/hooks/useSingleLineJournalForm.ts
            src/features/journal/services/journal-entry.service.ts
            src/shared/date/local-date.ts
